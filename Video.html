<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Engine 🚀</title>
    <style>
        body { font-family: sans-serif; background: #0b0f19; color: white; text-align: center; padding: 20px; }
        .app-card { max-width: 450px; margin: auto; background: #161b22; padding: 30px; border-radius: 30px; border: 1px solid #30363d; }
        textarea { width: 100%; height: 80px; background: #0d1117; border: 1px solid #333; border-radius: 12px; padding: 12px; color: white; margin-top: 10px; box-sizing: border-box; }
        .gen-btn { width: 100%; padding: 16px; background: #238636; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #status-box { margin-top: 20px; color: #58a6ff; font-weight: bold; }
        .result { display: none; margin-top: 20px; }
        .dl-btn { background: #1f6feb; padding: 12px 20px; color: white; text-decoration: none; border-radius: 8px; display: inline-block; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>AI Video Engine 🎬</h2>
    <textarea id="topic" placeholder="Topic: Horror story in Hindi..."></textarea>
    <button class="gen-btn" id="genBtn" onclick="createVideo()">Generate AI Video ✨</button>
    <div id="status-box"></div>
    <div class="result" id="res">
        <p>Video Taiyar Hai! ✅</p>
        <a id="downloadLink" class="dl-btn" target="_blank">📥 Download Video</a>
    </div>
</div>

<script>
async function createVideo() {
    const topic = document.getElementById('topic').value.trim();
    const status = document.getElementById('status-box');
    const res = document.getElementById('res');
    const dlLink = document.getElementById('downloadLink');
    const btn = document.getElementById('genBtn');

    if(!topic) return alert("Kuch toh likho!");

    // APIs (Sirf Script aur Video ke liye)
    const groqKey = "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";
    const pexelsKey = "eKXTvfpgjiskX3vZVViZIGHyBgGNB8kB3SbLgjrKrkosXbfBdSG3KGWy";

    status.innerText = "1. Writing Horror Script... ✍️";
    btn.disabled = true;
    res.style.display = "none";

    try {
        // 1. Script Generation (Groq)
        const gRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
            body: JSON.stringify({ 
                model: "llama-3.3-70b-versatile", 
                messages: [{ role: "user", content: "Write a scary 130-word horror story in Hinglish about: " + topic }] 
            })
        });
        const gData = await gRes.json();
        const script = gData.choices[0].message.content;

        // 2. Video Fetch (Pexels)
        status.innerText = "2. Finding Horror Video... 🎥";
        const pRes = await fetch(`https://api.pexels.com/videos/search?query=${topic}+horror&per_page=1&orientation=portrait`, {
            headers: { "Authorization": pexelsKey }
        });
        const pData = await pRes.json();
        const videoUrl = pData.videos[0].video_files[0].link;

        // 3. Unlimited Voice (Browser Speech)
        status.innerText = "3. Finalizing Voice & Video... ⚙️";
        
        // Voice ko play karne ke liye
        const speech = new SpeechSynthesisUtterance(script);
        speech.lang = 'hi-IN';
        speech.rate = 0.8;
        window.speechSynthesis.speak(speech);

        // Result Show
        setTimeout(() => {
            status.innerText = "Processing Complete! 🎉";
            dlLink.href = videoUrl;
            res.style.display = "block";
        }, 3000);

    } catch (e) {
        status.innerText = "Server busy! Ek baar phir try karein.";
    } finally {
        btn.disabled = false;
    }
}
</script>

</body>
</html>
