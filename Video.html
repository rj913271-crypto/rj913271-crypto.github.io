<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reel Master 40s 🎬</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: white; text-align: center; margin: 0; padding: 15px; }
        .app-container { max-width: 420px; margin: auto; background: #111; border-radius: 30px; padding: 25px; border: 1px solid #333; box-shadow: 0 0 30px rgba(0,123,255,0.2); }
        textarea { width: 100%; height: 80px; background: #1a1a1a; border: 1px solid #444; border-radius: 15px; padding: 15px; color: white; margin-top: 10px; outline: none; box-sizing: border-box; font-size: 15px; }
        .gen-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #007bff, #0056b3); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 17px; transition: 0.3s; }
        .gen-btn:disabled { background: #444; cursor: not-allowed; }
        
        /* 9:16 REEL FRAME */
        #reel-frame { width: 100%; height: 550px; background: #000; border-radius: 20px; margin-top: 25px; position: relative; overflow: hidden; display: none; border: 2px solid #007bff; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #caption-box { position: absolute; bottom: 30px; left: 15px; right: 15px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 15px; font-size: 15px; text-align: left; border-left: 5px solid #fbbf24; line-height: 1.5; color: #fff; }
        #loader { display: none; margin-top: 20px; color: #007bff; font-weight: bold; }
        audio { width: 100%; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 style="margin:0; color:#007bff;">AI Reel Creator 🚀</h2>
    <p style="font-size: 12px; color: #888;">Generate 40s Viral Video with Voice</p>
    
    <textarea id="topic" placeholder="Likho: Story of a brave king ya Science fact..."></textarea>
    
    <button class="gen-btn" id="genBtn" onclick="generateFullReel()">Create AI Video ✨</button>
    
    <div id="loader">AI dimag laga raha hai... ⏳</div>

    <div id="reel-frame">
        <video id="mainVideo" loop muted playsinline></video>
        <div id="caption-box"></div>
    </div>
    
    <audio id="mainAudio" controls></audio>
</div>

<script>
async function generateFullReel() {
    const topic = document.getElementById('topic').value.trim();
    const loader = document.getElementById('loader');
    const frame = document.getElementById('reel-frame');
    const video = document.getElementById('mainVideo');
    const caption = document.getElementById('caption-box');
    const audio = document.getElementById('mainAudio');
    const btn = document.getElementById('genBtn');

    if(!topic) return alert("Bhai, topic toh dalo!");

    // SAARI APIs UPDATED ✅
    const groqKey = "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";
    const pexelsKey = "eKXTvfpgjiskX3vZVViZIGHyBgGNB8kB3SbLgjrKrkosXbfBdSG3KGWy";
    const elevenKey = "sk_a7c43e0fb3c99c7bba8755a053ba0543efe40471c35ae36e"; 

    loader.style.display = "block";
    frame.style.display = "none";
    btn.disabled = true;

    try {
        // 1. GENERATE SCRIPT (Approx 100 words for 40s)
        const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
            body: JSON.stringify({ 
                model: "llama-3.3-70b-versatile", 
                messages: [{ role: "user", content: "Write a 100-word viral video script in Hinglish about: " + topic }] 
            })
        });
        const groqData = await groqRes.json();
        const script = groqData.choices[0].message.content;
        caption.innerText = script;

        // 2. FETCH PORTRAIT VIDEO (Pexels)
        const pRes = await fetch(`https://api.pexels.com/videos/search?query=${topic}&per_page=1&orientation=portrait`, {
            headers: { "Authorization": pexelsKey }
        });
        const pData = await pRes.json();
        if(pData.videos && pData.videos.length > 0) {
            video.src = pData.videos[0].video_files[0].link;
        }

        // 3. GENERATE VOICE (ElevenLabs - Rachel Voice)
        const voiceId = "21m00Tcm4TlvDq8ikWAM"; 
        const vRes = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
            method: "POST",
            headers: { "xi-api-key": elevenKey, "Content-Type": "application/json" },
            body: JSON.stringify({ 
                text: script, 
                model_id: "eleven_multilingual_v2",
                voice_settings: { stability: 0.5, similarity_boost: 0.75 } 
            })
        });

        if(vRes.ok) {
            const blob = await vRes.blob();
            audio.src = URL.createObjectURL(blob);
            audio.style.display = "block";
            frame.style.display = "block";
            video.play();
            audio.play();
        } else {
            const err = await vRes.json();
            alert("ElevenLabs Error: " + err.detail.message);
        }

    } catch (e) {
        alert("Server Busy! Ek baar phir try karein.");
    } finally {
        loader.style.display = "none";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
