<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>40s AI Video Master 🎬</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: white; text-align: center; margin: 0; padding: 15px; }
        .app-box { max-width: 400px; margin: auto; background: #111; border-radius: 25px; padding: 20px; border: 1px solid #333; }
        textarea { width: 100%; height: 80px; background: #222; border: 1px solid #444; border-radius: 15px; padding: 12px; color: white; margin-top: 10px; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        /* 9:16 REEL FRAME */
        #video-frame { 
            width: 100%; 
            height: 580px; 
            background: #222; 
            border-radius: 20px; 
            margin-top: 20px; 
            position: relative; 
            overflow: hidden; 
            display: none; 
            border: 2px solid #007bff;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #overlay-text { 
            position: absolute; bottom: 40px; left: 15px; right: 15px;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px;
            font-size: 16px; text-align: left; border-left: 5px solid yellow;
        }
        #dl-btn { background: #28a745; display: none; }
    </style>
</head>
<body>

<div class="app-box">
    <h2>40s AI Reel Creator 🚀</h2>
    <textarea id="topic" placeholder="Likho: Deep Space Secrets (Long Story)..."></textarea>
    <button class="btn" id="genBtn" onclick="generateLongVideo()">Create 40s Video ✨</button>
    <button class="btn" id="dl-btn" onclick="downloadLogic()">📥 Download Final Video</button>
    
    <div id="loader" style="display:none; margin-top:15px;">AI Script & Voice taiyar ho rahi hai... ⏳</div>

    <div id="video-frame">
        <video id="mainVideo" loop muted playsinline></video>
        <div id="overlay-text"></div>
    </div>
    
    <audio id="mainAudio"></audio>
</div>

<script>
async function generateLongVideo() {
    const topic = document.getElementById('topic').value.trim();
    if(!topic) return alert("Pehle topic likho!");

    const loader = document.getElementById('loader');
    const frame = document.getElementById('video-frame');
    const video = document.getElementById('mainVideo');
    const audio = document.getElementById('mainAudio');
    const overlay = document.getElementById('overlay-text');
    const dlBtn = document.getElementById('dl-btn');

    // API KEYS
    const groqKey = "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";
    const elevenKey = "Sk_3ada94e77dfae805d31312017c0741c3093118fb9afd5cee";
    const pexelsKey = "eKXTvfpgjiskX3vZVViZIGHyBgGNB8kB3SbLgjrKrkosXbfBdSG3KGWy";

    loader.style.display = "block";
    frame.style.display = "none";

    try {
        // 1. Long Script (80-100 words approx 40s speech)
        const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
            body: JSON.stringify({ 
                model: "llama-3.3-70b-versatile", 
                messages: [{ role: "user", content: "Write a 100-word interesting story in Hinglish about: " + topic }] 
            })
        });
        const groqData = await groqRes.json();
        const script = groqData.choices[0].message.content;
        overlay.innerText = script;

        // 2. Long Video (Portrait)
        const pRes = await fetch(`https://api.pexels.com/videos/search?query=${topic}&per_page=1&orientation=portrait`, {
            headers: { "Authorization": pexelsKey }
        });
        const pData = await pRes.json();
        video.src = pData.videos[0].video_files[0].link;

        // 3. Voice (ElevenLabs Multilingual)
        const vRes = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/pNInz6obpgnuMGrWqeXg`, {
            method: "POST",
            headers: { "xi-api-key": elevenKey, "Content-Type": "application/json" },
            body: JSON.stringify({ text: script, model_id: "eleven_multilingual_v2" })
        });
        const audioBlob = await vRes.blob();
        audio.src = URL.createObjectURL(audioBlob);

        // Display Everything
        frame.style.display = "block";
        dlBtn.style.display = "block";
        video.play();
        audio.play();

    } catch (e) { alert("API Limit Error! Dusri Gmail use karein."); }
    loader.style.display = "none";
}

function downloadLogic() {
    alert("Bhai, 40 second ki MP4 browser mein merge karna slow hai. Aap abhi Video aur Audio ko alag se download karke VN Editor mein merge kar sakte hain. Kya main Merge-API add karoon?");
}
</script>

</body>
</html>
