<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Unlimited Video Merger 🎬</title>
    <style>
        body { font-family: sans-serif; background: #000; color: white; text-align: center; padding: 15px; }
        .box { max-width: 400px; margin: auto; background: #111; padding: 20px; border-radius: 25px; border: 1px solid #333; }
        textarea { width: 100%; height: 60px; background: #222; border: 1px solid #444; border-radius: 12px; padding: 10px; color: white; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* 9:16 REEL FRAME FOR RECORDING */
        #recording-zone { width: 100%; height: 500px; background: #000; border-radius: 20px; margin-top: 20px; position: relative; overflow: hidden; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #caption { position: absolute; bottom: 30px; left: 15px; right: 15px; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 10px; font-size: 14px; text-align: left; color: yellow; border-left: 4px solid white; }
    </style>
</head>
<body>

<div class="box">
    <h2>AI Video Merger (Free) 🚀</h2>
    <textarea id="topic" placeholder="Topic: Scary Horror Story..."></textarea>
    <button class="btn" id="genBtn" onclick="startProcess()">Generate & Merge ✨</button>
    <div id="status" style="margin-top:10px; color:#007bff; font-size:12px;"></div>
    
    <div id="recording-zone">
        <video id="bgVideo" loop muted playsinline></video>
        <div id="caption"></div>
    </div>
    
    <button id="dlBtn" class="btn" style="display:none; background:#28a745;" onclick="downloadMP4()">📥 Download Final MP4</button>
</div>

<script>
let recorder;
let chunks = [];

async function startProcess() {
    const topic = document.getElementById('topic').value.trim();
    const status = document.getElementById('status');
    const zone = document.getElementById('recording-zone');
    const video = document.getElementById('bgVideo');
    const caption = document.getElementById('caption');

    if(!topic) return alert("Pehle topic likho!");

    // APIs
    const groqKey = "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";
    const pexelsKey = "eKXTvfpgjiskX3vZVViZIGHyBgGNB8kB3SbLgjrKrkosXbfBdSG3KGWy";

    status.innerText = "Writing 1-Minute Script... ✍️";

    try {
        // 1. Script (130 words)
        const gRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
            body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: "Write a 120-word deep story in Hinglish: " + topic }] })
        });
        const gData = await gRes.json();
        const script = gData.choices[0].message.content;

        // 2. Video (Pexels)
        status.innerText = "Fetching Video... 🎥";
        const pRes = await fetch(`https://api.pexels.com/videos/search?query=${topic}&per_page=1&orientation=portrait`, {
            headers: { "Authorization": pexelsKey }
        });
        const pData = await pRes.json();
        
        video.src = pData.videos[0].video_files[0].link;
        caption.innerText = script;
        zone.style.display = "block";
        video.play();

        // 3. Unlimited Voice & Auto-Merge Start
        status.innerText = "Merging Voice & Video... ⚙️";
        const speech = new SpeechSynthesisUtterance(script);
        speech.lang = 'hi-IN';
        speech.rate = 0.9;

        // Recording the frame
        const stream = zone.captureStream(30); // Capture at 30fps
        recorder = new MediaRecorder(stream);
        recorder.ondataavailable = (e) => chunks.push(e.data);
        recorder.onstop = () => {
            document.getElementById('dlBtn').style.display = "block";
            status.innerText = "Merge Successful! ✅";
        };

        recorder.start();
        window.speechSynthesis.speak(speech);

        // Jab speech khatam ho jaye, recording band kar do
        speech.onend = () => {
            recorder.stop();
            video.pause();
        };

    } catch (e) {
        status.innerText = "Error! Kuch der baad try karein.";
    }
}

function downloadMP4() {
    const blob = new Blob(chunks, { type: 'video/mp4' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'AI_Merged_Video.mp4';
    a.click();
}
</script>

</body>
</html>
