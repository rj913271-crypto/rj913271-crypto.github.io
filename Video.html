<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlimited AI Reel Master 🎬</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: white; text-align: center; margin: 0; padding: 15px; }
        .app-container { max-width: 420px; margin: auto; background: #111; border-radius: 30px; padding: 25px; border: 1px solid #333; }
        textarea { width: 100%; height: 80px; background: #1a1a1a; border: 1px solid #444; border-radius: 15px; padding: 15px; color: white; outline: none; box-sizing: border-box; font-size: 15px; }
        .gen-btn { width: 100%; padding: 16px; background: #007bff; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; }
        
        /* REEL DISPLAY */
        #reel-frame { width: 100%; height: 550px; background: #000; border-radius: 20px; margin-top: 25px; position: relative; overflow: hidden; display: none; border: 2px solid #333; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; }
        #caption-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 30px 15px; text-align: left; font-size: 15px; line-height: 1.5; color: #fff; border-bottom: 5px solid #007bff; }

        #loader { display: none; margin-top: 20px; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Unlimited AI Reel 🎬</h2>
    <p style="font-size: 11px; color: #888;">No Character Limit | 100% Free Voice</p>
    
    <textarea id="topic" placeholder="Likho: Story of a brave warrior..."></textarea>
    
    <button class="gen-btn" id="mainBtn" onclick="generateUnlimitedReel()">Create 40s Reel ✨</button>
    
    <div id="loader">AI is Processing... ⏳</div>

    <div id="reel-frame">
        <video id="bg-video" loop muted playsinline></video>
        <div id="caption-overlay"></div>
    </div>
</div>

<script src="https://code.responsivevoice.org/responsivevoice.js?key=YOUR_FREE_KEY"></script>

<script>
async function generateUnlimitedReel() {
    const topic = document.getElementById('topic').value.trim();
    const loader = document.getElementById('loader');
    const frame = document.getElementById('reel-frame');
    const video = document.getElementById('bg-video');
    const overlay = document.getElementById('caption-overlay');
    const btn = document.getElementById('mainBtn');

    if(!topic) return alert("Bhai, topic toh dalo!");

    // APIs (Sirf Groq aur Pexels chahiye)
    const groqKey = "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";
    const pexelsKey = "eKXTvfpgjiskX3vZVViZIGHyBgGNB8kB3SbLgjrKrkosXbfBdSG3KGWy";

    loader.style.display = "block";
    frame.style.display = "none";
    btn.disabled = true;

    try {
        // 1. Script (Groq)
        const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
            body: JSON.stringify({ 
                model: "llama-3.3-70b-versatile", 
                messages: [{ role: "user", content: "Write a short 60-word viral Hinglish story about: " + topic }] 
            })
        });
        const groqData = await groqRes.json();
        const script = groqData.choices[0].message.content;
        overlay.innerText = script;

        // 2. Video (Pexels)
        const pexelsRes = await fetch(`https://api.pexels.com/videos/search?query=${topic}&per_page=1&orientation=portrait`, {
            headers: { "Authorization": pexelsKey }
        });
        const pexelsData = await pexelsRes.json();
        
        if(pexelsData.videos.length > 0) {
            video.src = pexelsData.videos[0].video_files[0].link;
            frame.style.display = "block";
            video.play();

            // 3. VOICE (Unlimited Method - Hindi Female/Male)
            // Isme koi API key nahi lagti
            responsiveVoice.speak(script, "Hindi Female", {
                pitch: 1, 
                rate: 1, 
                volume: 1
            });
        }

    } catch (e) {
        alert("Server limit! Thoda wait karein.");
    } finally {
        loader.style.display = "none";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
