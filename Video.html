<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Magic Script ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; text-align: center; padding: 25px; background: #f0f2f5; margin: 0; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block; width: 95%; max-width: 420px; border: 2px solid #2ecc71; }
        textarea { width: 100%; height: 110px; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 12px; font-size: 15px; outline: none; box-sizing: border-box; resize: none; background: #fafafa; }
        button { width: 100%; padding: 15px; background: linear-gradient(90deg, #2ecc71, #27ae60); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        #loader { display: none; margin-top: 20px; font-weight: bold; color: #27ae60; }
        #result { margin-top: 25px; text-align: left; background: #f9f9f9; padding: 18px; border-radius: 15px; border: 1px solid #ccc; display: none; white-space: pre-wrap; font-size: 14px; line-height: 1.6; color: #333; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="margin:0; color:#1b5e20;">AI Magic Script ✨</h2>
    <p style="color: #27ae60; font-size: 11px; font-weight: bold; margin-top:5px;">FAST AI ENGINE: ACTIVE ⚡</p>
    
    <textarea id="topic" placeholder="Likho: 5 Cricket Secrets..."></textarea>
    
    <button id="genBtn" onclick="runAI()">Generate Viral Script 🚀</button>
    
    <div id="loader">Llama AI script likh raha hai...</div>
    <div id="result"></div>
</div>

<script>
async function runAI() {
    const topic = document.getElementById('topic').value.trim();
    const resDiv = document.getElementById('result');
    const loading = document.getElementById('loader');
    const genBtn = document.getElementById('genBtn');

    if(!topic) return alert("Bhai, pehle topic toh likho!");

    // AAPKI LATEST GROQ KEY
    const apiKey = "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";
    
    loading.style.display = "block";
    resDiv.style.display = "none";
    genBtn.disabled = true;

    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${apiKey}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [
                    {
                        role: "system",
                        content: "You are a viral script writer. Write engaging, short, and funny video scripts in Hinglish."
                    },
                    {
                        role: "user",
                        content: "Write a short viral video script for: " + topic
                    }
                ],
                temperature: 0.7
            })
        });

        const data = await response.json();
        loading.style.display = "none";
        genBtn.disabled = false;

        if (data.choices && data.choices[0].message) {
            resDiv.innerText = data.choices[0].message.content;
            resDiv.style.display = "block";
        } else {
            alert("Error: " + (data.error ? data.error.message : "Kuch galat hua!"));
        }
    } catch (e) {
        loading.style.display = "none";
        genBtn.disabled = false;
        alert("Internet Check Karein!");
    }
}
</script>

</body>
</html>
