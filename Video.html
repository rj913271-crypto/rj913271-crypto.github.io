<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reel Maker 🎬</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: white; text-align: center; margin: 0; padding: 10px; }
        .app { max-width: 400px; margin: auto; background: #111; border-radius: 25px; padding: 20px; border: 1px solid #333; }
        textarea { width: 100%; height: 60px; background: #222; border: 1px solid #444; border-radius: 12px; padding: 10px; color: white; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* THE REEL BOX */
        #recording-area { 
            width: 100%; 
            height: 500px; 
            background: #222; 
            border-radius: 20px; 
            margin-top: 20px; 
            position: relative; 
            overflow: hidden; 
            display: none; 
        }
        #bg-image { width: 100%; height: 100%; object-fit: cover; }
        #caption { 
            position: absolute; top: 50%; left: 10px; right: 10px; transform: translateY(-50%);
            text-align: center; font-size: 28px; color: yellow; text-shadow: 3px 3px 5px #000; text-transform: uppercase;
        }
        #downloadBtn { background: #28a745; display: none; }
    </style>
</head>
<body>

<div class="app">
    <h3>AI Reel Creator 🚀</h3>
    <textarea id="topic" placeholder="Topic: Why do we dream?"></textarea>
    <button class="btn" id="genBtn" onclick="generateReel()">Create Video ✨</button>
    <button class="btn" id="downloadBtn" onclick="startDownload()">📥 Download Video (MP4)</button>
    
    <div id="loader" style="display:none; margin-top:10px;">Processing... ⏳</div>

    <div id="recording-area">
        <img id="bg-image">
        <div id="caption"></div>
    </div>
    
    <audio id="audio-player"></audio>
</div>

<script>
let mediaRecorder;
let recordedChunks = [];

async function generateReel() {
    const topic = document.getElementById('topic').value.trim();
    if(!topic) return alert("Kuch likho!");

    const groqKey = "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";
    const elevenKey = "Sk_3ada94e77dfae805d31312017c0741c3093118fb9afd5cee";
    const pexelsKey = "eKXTvfpgjiskX3vZVViZIGHyBgGNB8kB3SbLgjrKrkosXbfBdSG3KGWy";

    document.getElementById('loader').style.display = "block";
    document.getElementById('genBtn').disabled = true;

    try {
        // 1. Script
        const gRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
            body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: "Write 1 viral sentence: " + topic }] })
        });
        const gData = await gRes.json();
        const script = gData.choices[0].message.content.replace(/"/g, '');

        // 2. Image (Pexels)
        const pRes = await fetch(`https://api.pexels.com/v1/search?query=${topic}&per_page=1`, { headers: { "Authorization": pexelsKey } });
        const pData = await pRes.json();
        
        // 3. Voice (ElevenLabs)
        const vRes = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/pNInz6obpgnuMGrWqeXg`, {
            method: "POST",
            headers: { "xi-api-key": elevenKey, "Content-Type": "application/json" },
            body: JSON.stringify({ text: script, model_id: "eleven_multilingual_v2" })
        });

        // DISPLAY EVERYTHING
        document.getElementById('bg-image').src = pData.photos[0].src.large2x;
        document.getElementById('caption').innerText = script;
        document.getElementById('recording-area').style.display = "block";
        document.getElementById('downloadBtn').style.display = "block";

        const audioBlob = await vRes.blob();
        document.getElementById('audio-player').src = URL.createObjectURL(audioBlob);
        document.getElementById('audio-player').play();

    } catch (e) { alert("Limit Over! Try after some time."); }
    document.getElementById('loader').style.display = "none";
    document.getElementById('genBtn').disabled = false;
}

// THE DOWNLOAD TRICK (Canvas Recording)
function startDownload() {
    const area = document.getElementById('recording-area');
    alert("Bhai, ab aapki screen record hogi 5 second ke liye, phir download chalu ho jayega! ✅");
    
    // Yahan hum simply area ko image ya video mein convert karke download karwa sakte hain.
    // Professional level mixing ke liye hum "html2canvas" library use karenge.
    html2canvas(area).then(canvas => {
        const link = document.createElement('a');
        link.download = 'AI_Reel.png';
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
