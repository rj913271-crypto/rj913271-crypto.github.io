<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Magic Script ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; text-align: center; padding: 25px; background: #fdf1e1; margin: 0; }
        .box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block; width: 95%; max-width: 420px; border: 2.5px solid #f45a32; }
        textarea { width: 100%; height: 100px; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 12px; font-size: 15px; outline: none; box-sizing: border-box; resize: none; }
        button { width: 100%; padding: 15px; background: linear-gradient(90deg, #f45a32, #ff9545); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        #loader { display: none; margin-top: 15px; font-weight: bold; color: #f45a32; }
        #result { margin-top: 25px; text-align: left; background: #f9f9f9; padding: 18px; border-radius: 15px; border: 1px solid #ccc; display: none; white-space: pre-wrap; font-size: 14px; line-height: 1.6; color: #333; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="margin:0;">AI Magic Script ✨</h2>
    <p style="color: blue; font-size: 11px; font-weight: bold; margin-top:5px;">ULTRA-STABLE 2026 PATH ✅</p>
    
    <textarea id="topic" placeholder="Likho: Cricket Funny Facts"></textarea>
    
    <button id="genBtn" onclick="runAI()">Generate Script 🚀</button>
    
    <div id="loader">AI dimag laga raha hai...</div>
    <div id="result"></div>
</div>

<script>
async function runAI() {
    const topic = document.getElementById('topic').value.trim();
    const resDiv = document.getElementById('result');
    const loading = document.getElementById('loader');

    if(!topic) return alert("Kuch toh likho bhai!");

    // AAPKI LATEST DEFAULT PROJECT KEY
    const apiKey = "AIzaSyCii7ry4SvwTpixl0Tj9a0XXNss_OT5B4E";
    
    /* MASTER FIX: 
       Hum v1beta version use karenge kyunki naye accounts ke Free Tier models 
       isi par active hote hain.
    */
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

    loading.style.display = "block";
    resDiv.style.display = "none";

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: "Write a short viral script for: " + topic }] }]
            })
        });

        const data = await response.json();
        loading.style.display = "none";

        if (data.candidates && data.candidates[0].content) {
            resDiv.innerText = data.candidates[0].content.parts[0].text;
            resDiv.style.display = "block";
        } else {
            // Detailed message for fix
            const errorMsg = data.error ? data.error.message : "Sync error. Wait 2 mins.";
            alert("System Message: " + errorMsg);
            console.log(data);
        }
    } catch (e) {
        loading.style.display = "none";
        alert("Internet connection check karein!");
    }
}
</script>

</body>
</html>
