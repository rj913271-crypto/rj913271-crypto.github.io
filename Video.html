<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reel Master Pro 🎬</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: white; text-align: center; margin: 0; padding: 15px; }
        .app-container { max-width: 420px; margin: auto; background: #111; border-radius: 30px; padding: 25px; border: 1px solid #333; box-shadow: 0 0 40px rgba(0,123,255,0.15); }
        h2 { color: #007bff; margin: 0; font-size: 24px; font-weight: 900; }
        p.subtitle { font-size: 11px; color: #888; margin-bottom: 20px; }
        
        textarea { width: 100%; height: 80px; background: #1a1a1a; border: 1px solid #444; border-radius: 15px; padding: 15px; color: white; outline: none; box-sizing: border-box; font-size: 15px; transition: 0.3s; }
        textarea:focus { border-color: #007bff; }
        
        .gen-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #007bff, #0056b3); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; box-shadow: 0 4px 15px rgba(0,123,255,0.3); }
        .gen-btn:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }

        /* REEL DISPLAY */
        #reel-frame { width: 100%; height: 550px; background: #000; border-radius: 20px; margin-top: 25px; position: relative; overflow: hidden; display: none; border: 2px solid #333; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; }
        #caption-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 30px 15px; text-align: left; font-size: 15px; line-height: 1.5; color: #fff; font-weight: 400; border-bottom: 5px solid #007bff; }

        /* DOWNLOAD SECTION */
        .download-box { display: none; margin-top: 20px; gap: 10px; }
        .dl-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 13px; color: white; display: inline-block; }
        .dl-video { background: #28a745; }
        .dl-audio { background: #6610f2; }

        #loader { display: none; margin-top: 20px; color: #007bff; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>AI Reel Master 🎬</h2>
    <p class="subtitle">Create 40s Viral Video with Pro AI Voice</p>
    
    <textarea id="topic" placeholder="Likho: Motivational story about success ya Space secrets..."></textarea>
    
    <button class="gen-btn" id="mainBtn" onclick="generateAIReel()">Generate 40s AI Reel ✨</button>
    
    <div id="loader">AI is Processing... ⏳</div>

    <div id="reel-frame">
        <video id="bg-video" loop muted playsinline></video>
        <div id="caption-overlay"></div>
    </div>
    
    <div class="download-box" id="dlBox">
        <a id="vidLink" class="dl-btn dl-video" target="_blank" download="AI_Video.mp4">📥 Save Video</a>
        <button id="audBtn" class="dl-btn dl-audio" onclick="downloadAudio()">🔊 Save Voice</button>
    </div>

    <audio id="bg-audio"></audio>
</div>

<script>
let globalAudioBlob = null;

async function generateAIReel() {
    const topic = document.getElementById('topic').value.trim();
    const loader = document.getElementById('loader');
    const frame = document.getElementById('reel-frame');
    const dlBox = document.getElementById('dlBox');
    const video = document.getElementById('bg-video');
    const overlay = document.getElementById('caption-overlay');
    const audio = document.getElementById('bg-audio');
    const btn = document.getElementById('mainBtn');
    const vidLink = document.getElementById('vidLink');

    if(!topic) return alert("Bhai, kuch topic toh dalo!");

    // ALL API KEYS UPDATED ✅
    const groqKey = "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";
    const pexelsKey = "eKXTvfpgjiskX3vZVViZIGHyBgGNB8kB3SbLgjrKrkosXbfBdSG3KGWy";
    const elevenKey = "sk_a7c43e0fb3c99c7bba8755a053ba0543efe40471c35ae36e"; 
    const voiceId = "21m00Tcm4TlvDq8ikWAM"; // Rachel Voice (Stable)

    loader.style.display = "block";
    frame.style.display = "none";
    dlBox.style.display = "none";
    btn.disabled = true;

    try {
        // 1. Script Generation (Groq - 100 words approx 40s)
        const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
            body: JSON.stringify({ 
                model: "llama-3.3-70b-versatile", 
                messages: [{ role: "user", content: "Write a 100-word deep viral story in Hinglish for a video about: " + topic }] 
            })
        });
        const groqData = await groqRes.json();
        const script = groqData.choices[0].message.content;
        overlay.innerText = script;

        // 2. Portrait Video (Pexels)
        const pexelsRes = await fetch(`https://api.pexels.com/videos/search?query=${topic}&per_page=1&orientation=portrait`, {
            headers: { "Authorization": pexelsKey }
        });
        const pexelsData = await pexelsRes.json();
        if(pexelsData.videos.length > 0) {
            const vUrl = pexelsData.videos[0].video_files[0].link;
            video.src = vUrl;
            vidLink.href = vUrl;
        }

        // 3. Voice Generation (ElevenLabs)
        const voiceRes = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
            method: "POST",
            headers: { "xi-api-key": elevenKey, "Content-Type": "application/json" },
            body: JSON.stringify({ 
                text: script, 
                model_id: "eleven_multilingual_v2",
                voice_settings: { stability: 0.5, similarity_boost: 0.8 } 
            })
        });

        if(voiceRes.ok) {
            globalAudioBlob = await voiceRes.blob();
            audio.src = URL.createObjectURL(globalAudioBlob);
            
            frame.style.display = "block";
            dlBox.style.display = "flex";
            video.play();
            audio.play();
        } else {
            const err = await voiceRes.json();
            alert("ElevenLabs Error: " + err.detail.message);
        }

    } catch (e) {
        alert("Server Busy! Check your API limit.");
    } finally {
        loader.style.display = "none";
        btn.disabled = false;
    }
}

function downloadAudio() {
    if(!globalAudioBlob) return;
    const url = URL.createObjectURL(globalAudioBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = "AI_Voice_40s.mp3";
    a.click();
}
</script>

</body>
</html>
