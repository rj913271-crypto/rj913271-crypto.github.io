<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Login - Premium Rewards</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    
    body { 
        background: #fdf1e1; 
        color: #333; 
        height: 100vh; 
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .bg-gradient {
        background: linear-gradient(180deg, #f45a32 0%, #ff9545 40%, #fdf1e1 100%);
        height: 100vh; 
        width: 100%;
        position: absolute;
        top: 0;
        z-index: -1;
    }

    .login-card {
        background: white;
        width: 88%;
        max-width: 400px;
        padding: 40px 25px 30px;
        border-radius: 40px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0,0,0,0.12);
        position: relative;
    }

    .icon-box {
        background: #681212;
        width: 80px; height: 80px;
        border-radius: 25px;
        margin: -85px auto 20px;
        display: flex; align-items: center; justify-content: center;
        color: white; font-size: 35px;
        box-shadow: 0 10px 25px rgba(104, 18, 18, 0.3);
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(104, 18, 18, 0.5); }
        70% { box-shadow: 0 0 0 15px rgba(104, 18, 18, 0); }
        100% { box-shadow: 0 0 0 0 rgba(104, 18, 18, 0); }
    }

    h2 { color: #681212; font-weight: 800; font-size: 24px; margin-bottom: 8px; }
    p { font-size: 13px; color: #777; line-height: 1.5; margin-bottom: 25px; }

    .auth-container {
        background: #fff8f5;
        border: 2px dashed #f45a32;
        padding: 25px 15px;
        border-radius: 30px;
        margin-bottom: 20px;
    }

    .auth-label {
        font-size: 11px;
        font-weight: 700;
        color: #f45a32;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 15px;
    }

    .pe_signin_button {
        display: inline-block;
        transform: scale(1.1);
        filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
    }

    /* Guest Login Button Style */
    .guest-btn {
        background: #681212;
        color: white;
        border: none;
        width: 100%;
        padding: 14px;
        border-radius: 15px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: 0.3s;
        margin-top: 10px;
    }
    .guest-btn:hover { background: #4a0d0d; }

    .secure-tag {
        font-size: 11px;
        color: #bbb;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-weight: 600;
        margin-top: 15px;
    }

    #statusMsg {
        font-size: 13px;
        font-weight: 700;
        color: #f45a32;
        margin: 10px 0;
        display: none;
    }
</style>
</head>
<body>

<div class="bg-gradient"></div>

<div class="login-card">
    <div class="icon-box"><i class="fas fa-user-shield"></i></div>
    
    <h2>Welcome</h2>
    <p>Earn coins by completing simple tasks. <br>Login to get <b>🪙 50 Coins Bonus!</b></p>

    <div class="auth-container">
        <div class="auth-label"><i class="fas fa-phone"></i> Mobile Login</div>
        <div class="pe_signin_button" data-client-id="15959639056637300233"></div>
        
        <div style="margin: 15px 0; color: #ddd; font-weight: bold; font-size: 12px;">OR</div>
        
        <button class="guest-btn" onclick="guestLogin()">
            <i class="fas fa-user-secret"></i> Continue as Guest
        </button>
    </div>

    <div id="statusMsg">Connecting to Server...</div>
    <div class="secure-tag"><i class="fas fa-lock"></i> AES-256 End-to-End Encryption</div>
</div>

<script src="https://www.phone.email/sign_in_button_v1.js"></script>

<script>
var firebaseConfig = {
 apiKey: "AIzaSyBrr8T6MhvyCR4ocLqkBjZFlkLbQXAEwyk",
 authDomain: "online-earning-app-607bb.firebaseapp.com",
 databaseURL: "https://online-earning-app-607bb-default-rtdb.firebaseio.com",
 projectId: "online-earning-app-607bb",
 storageBucket: "online-earning-app-607bb.firebasestorage.app",
 messagingSenderId: "447560090512",
 appId: "1:447560090512:web:7539f556d33ba39209a915"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

const urlParams = new URLSearchParams(window.location.search);
const referrerId = urlParams.get('ref');

window.onload = function() {
    const savedUID = localStorage.getItem("user_mobile");
    if (savedUID) {
        window.location.replace("Home.html?uid=" + savedUID);
    }
};

// --- GUEST LOGIN LOGIC ---
function guestLogin() {
    const status = document.getElementById("statusMsg");
    status.style.display = "block";
    status.innerText = "Creating Guest Account...";

    // Generate a unique Guest ID if not exists
    let guestId = "GUEST_" + Math.floor(100000 + Math.random() * 900000);
    
    var userRef = db.ref("users/" + guestId);
    userRef.set({
        name: "Guest_" + guestId.split('_')[1],
        phone: "Guest", // Marked as Guest to link later
        coins: 50,
        lifetime_earnings: 50,
        isGuest: true,
        created: Date.now()
    }).then(() => {
        status.innerText = "Guest Login Successful!";
        saveAndRedirect(guestId);
    });
}

function phoneEmailListener(userObj) {
    const status = document.getElementById("statusMsg");
    status.style.display = "block";

    fetch(userObj.user_json_url)
    .then(res => res.json())
    .then(data => {
        let phone = data.user_phone_number.replace("+91", "").replace("+", "").trim();
        if(!phone) return;

        var userRef = db.ref("users/" + phone);
        userRef.once("value").then(function(snapshot) {
            if(!snapshot.exists()) {
                userRef.set({
                    name: "Player_" + phone.substring(6),
                    phone: phone,
                    coins: 50,
                    lifetime_earnings: 50,
                    isGuest: false,
                    created: Date.now()
                }).then(() => {
                    if (referrerId && referrerId !== phone) {
                        giveReferralReward(referrerId, phone);
                    } else {
                        saveAndRedirect(phone);
                    }
                });
            } else {
                saveAndRedirect(phone);
            }
        });
    });
}

function giveReferralReward(refId, newUserId) {
    const refPath = db.ref("users/" + refId);
    refPath.once("value").then(snap => {
        if(snap.exists()) {
            let data = snap.val();
            refPath.update({
                coins: (data.coins || 0) + 100,
                lifetime_earnings: (data.lifetime_earnings || 0) + 100
            });
            db.ref("users/" + refId + "/history/earnings").push({
                amount: 100, reason: "Referral Bonus", date: new Date().toLocaleDateString()
            });
        }
        saveAndRedirect(newUserId);
    });
}

function saveAndRedirect(uid) {
    localStorage.setItem("user_mobile", uid);
    setTimeout(() => { window.location.replace("Home.html?uid=" + uid); }, 1500);
}
</script>
</body>
</html>
